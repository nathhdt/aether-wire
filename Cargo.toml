[package]
name = "aether-wire"
version = "0.1.0"
edition = "2024"
description = "native cross-platform E2E network performance and benchmarking tool"

[[bin]]
name = "aw"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
bincode = "1.3"
clap = { version = "4.6.1", features = ["derive"] }
humantime = "2.3.0"
rand = "0.8"
rand_chacha = "0.3"
serde = { version = "1.0.228", features = ["derive"] }
