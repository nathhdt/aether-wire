[package]
name = "aether-wire"
version = "0.1.0"
edition = "2024"
description = "native cross-platform E2E network performance and benchmarking tool"

[[bin]]
name = "aw"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
bincode = "1.3.3"
clap = { version = "4.6.1", features = ["derive"] }
humantime = "2.3.0"
serde = { version = "1.0.228", features = ["derive"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
